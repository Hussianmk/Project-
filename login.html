<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NCC Portal – Login</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --olive:#4a5e2a;--olive-dark:#2d3a18;--olive-light:#6b8a3a;
  --gold:#c9a84c;--gold-light:#e8c96a;
  --bg:#0f1208;--surface:#1a1f0f;--border:#2e3a18;
  --text:#ddd8c0;--muted:#7a8060;
  --red:#8b2020;
}
body{
  font-family:'Rajdhani',sans-serif;
  background:var(--bg);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;
}
.bg-grid{
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(74,94,42,0.06) 1px,transparent 1px),
    linear-gradient(90deg,rgba(74,94,42,0.06) 1px,transparent 1px);
  background-size:40px 40px;
  z-index:0;
}
.bg-glow{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  width:700px;height:700px;
  background:radial-gradient(circle,rgba(74,94,42,0.18) 0%,transparent 65%);
  z-index:0;
  animation:breathe 5s ease-in-out infinite;
}
@keyframes breathe{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.6}50%{transform:translate(-50%,-50%) scale(1.15);opacity:1}}
.wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;width:420px;}
.crest{
  width:88px;height:88px;border-radius:50%;
  background:linear-gradient(145deg,var(--olive-dark),var(--olive));
  border:2px solid var(--gold);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:14px;
  box-shadow:0 0 40px rgba(201,168,76,0.35),inset 0 1px 0 rgba(255,255,255,0.1);
}
.crest svg{fill:var(--gold);width:48px;height:48px;}
.brand-title{
  font-family:'Bebas Neue',cursive;
  font-size:3rem;letter-spacing:6px;color:var(--gold);
  text-align:center;line-height:1;
  text-shadow:0 0 30px rgba(201,168,76,0.4);
}
.brand-sub{font-size:.82rem;letter-spacing:3px;color:var(--muted);text-align:center;margin-top:3px;text-transform:uppercase;}
.motto{
  font-family:'Space Mono',monospace;font-size:.68rem;color:var(--olive-light);
  letter-spacing:2px;text-align:center;margin:12px 0 28px;
  border:1px solid var(--border);padding:7px 22px;border-radius:2px;
}
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:4px;padding:30px;width:100%;
  box-shadow:0 24px 64px rgba(0,0,0,.6);
  position:relative;overflow:hidden;
}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--olive-dark),var(--gold),var(--olive-dark));}
.fl{margin-bottom:18px;}
.fl label{display:block;font-size:.7rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:7px;}
.fl input{
  width:100%;padding:11px 14px;
  background:var(--bg);border:1px solid var(--border);border-radius:3px;
  color:var(--text);font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:600;
  outline:none;transition:border-color .2s,box-shadow .2s;
}
.fl input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,0.08);}
.btn-login{
  width:100%;padding:13px;margin-top:4px;
  background:var(--olive);border:1px solid var(--olive-light);border-radius:3px;
  color:#f0ead8;font-family:'Bebas Neue',cursive;font-size:1.25rem;letter-spacing:4px;
  cursor:pointer;transition:all .2s;
}
.btn-login:hover{background:var(--olive-light);box-shadow:0 0 24px rgba(74,94,42,0.5);}
.btn-login:active{transform:scale(.98);}
.err{
  background:rgba(139,32,32,.2);border:1px solid rgba(139,32,32,.6);
  border-radius:3px;padding:9px 13px;color:#ff9090;font-size:.88rem;
  margin-top:14px;display:none;
}
.demo{margin-top:22px;padding:14px 16px;background:rgba(74,94,42,.08);border:1px solid var(--border);border-radius:3px;}
.demo strong{display:block;font-size:.68rem;letter-spacing:2px;color:var(--gold);margin-bottom:10px;text-transform:uppercase;}
.demo-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.demo-row:last-child{border:none;}
.demo-left{display:flex;align-items:center;gap:8px;font-size:.82rem;color:var(--muted);}
.badge{background:var(--olive-dark);border:1px solid var(--border);border-radius:2px;padding:1px 7px;font-size:.65rem;letter-spacing:1px;color:var(--olive-light);}
.demo-fill{background:transparent;border:1px solid var(--border);border-radius:2px;padding:2px 8px;font-size:.68rem;font-family:'Space Mono',monospace;color:var(--gold);cursor:pointer;transition:background .15s;}
.demo-fill:hover{background:rgba(201,168,76,.1);}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="wrap">
  <div class="crest">
    <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5L12 1zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>
  </div>
  <div class="brand-title">NCC PORTAL</div>
  <div class="brand-sub">National Cadet Corps · Army Wing</div>
  <div class="motto">UNITY &nbsp;·&nbsp; DISCIPLINE &nbsp;·&nbsp; LEADERSHIP</div>
  <div class="card">
    <div class="fl">
      <label>Username</label>
      <input id="uname" type="text" placeholder="Enter your username" autocomplete="username">
    </div>
    <div class="fl">
      <label>Password</label>
      <input id="pwd" type="password" placeholder="Enter your password" autocomplete="current-password">
    </div>
    <button class="btn-login" onclick="doLogin()">AUTHENTICATE</button>
    <div class="err" id="err"></div>
  </div>
  <div class="demo">
    <strong>Demo Credentials</strong>
    <div class="demo-row">
      <div class="demo-left"><span class="badge">ANO</span> ano_sharma</div>
      <button class="demo-fill" onclick="fill('ano_sharma','ano123')">ano123 →</button>
    </div>
    <div class="demo-row">
      <div class="demo-left"><span class="badge">CC</span> cc_rahul</div>
      <button class="demo-fill" onclick="fill('cc_rahul','cc123')">cc123 →</button>
    </div>
    <div class="demo-row">
      <div class="demo-left"><span class="badge">LC</span> lc_priya</div>
      <button class="demo-fill" onclick="fill('lc_priya','lc123')">lc123 →</button>
    </div>
    <div class="demo-row">
      <div class="demo-left"><span class="badge">CDT</span> cdt_arjun</div>
      <button class="demo-fill" onclick="fill('cdt_arjun','cdt123')">cdt123 →</button>
    </div>
  </div>
</div>
<script>
function fill(u,p){document.getElementById('uname').value=u;document.getElementById('pwd').value=p;}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
async function doLogin(){
  const u=document.getElementById('uname').value.trim();
  const p=document.getElementById('pwd').value.trim();
  const err=document.getElementById('err');
  err.style.display='none';
  if(!u||!p){err.style.display='block';err.textContent='Please enter username and password.';return;}
  try{
    const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const d=await r.json();
    if(!r.ok){err.style.display='block';err.textContent=d.error||'Login failed.';return;}
    localStorage.setItem('ncc_session',JSON.stringify({role:d.role,name:d.name,id:d.id,cadet_id:d.cadet_id}));
    window.location.href='/dashboard';
  }catch(e){err.style.display='block';err.textContent='Cannot connect to server. Is the app running?';}
}
</script>
</body>
</html>
